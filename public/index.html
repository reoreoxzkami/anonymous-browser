<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anonymous Browser</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .tabs {
      display: flex;
      margin-bottom: 15px;
    }

    .tabs button {
      flex: 1;
      background: transparent;
      border-bottom: 2px solid transparent;
    }

    .tabs button.active {
      border-bottom: 2px solid #3b82f6;
    }

    .hidden {
      display: none;
    }

    .app {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🌐 Anonymous Browser</h1>

  <div id="auth">
    <div class="tabs">
      <button id="loginTab" class="active">ログイン</button>
      <button id="registerTab">登録</button>
    </div>

    <div id="loginForm">
      <input id="loginEmail" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button id="loginBtn">ログイン</button>
    </div>

    <div id="registerForm" class="hidden">
      <input id="regEmail" placeholder="Email">
      <input id="regPass" type="password" placeholder="Password">
      <button id="registerBtn">登録</button>
    </div>
  </div>

  <div id="app" class="app">
    <h3>検索</h3>
    <input id="searchBox" placeholder="検索ワード">
    <button id="searchBtn">検索</button>

    <h3>URLアクセス</h3>
    <input id="urlBox" placeholder="https://example.com">
    <button id="openBtn">開く</button>

    <button id="logoutBtn" style="background:#ef4444;">ログアウト</button>
  </div>

</div>

<!-- 外部JS -->
<script src="script.js"></script>

</body>
</html>
