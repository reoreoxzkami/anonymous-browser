<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Anonymous Search - 安全な検索</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff;
  color: #202124;
}
.header {
  text-align: center;
  padding: 40px 20px;
}
.logo {
  font-size: 32px;
  font-weight: bold;
  color: #4285f4;
}
.search-box input {
  width: 60%;
  padding: 12px;
  border-radius: 24px;
  border: 1px solid #ddd;
}
.search-box button {
  padding: 12px 20px;
  border-radius: 24px;
  border: none;
  background: #4285f4;
  color: white;
}
.section {
  max-width: 800px;
  margin: 40px auto;
}
a {
  color: #1a0dab;
  text-decoration: none;
}
.footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #eee;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Anonymous Search</div>

  <form class="search-box" action="/search">
    <input id="searchInput" type="text" placeholder="検索ワードを入力">
<button onclick="search()">検索</button>

<div id="results"></div>
  </form>
</div>

<div class="section">
  <h2>このサイトについて</h2>
  <p>
  Anonymous Searchは、安全でプライバシーに配慮した検索を提供するサービスです。
  個人情報の追跡を最小限に抑え、安心してインターネットを利用できます。
  </p>
    <p>
このサイトでは匿名検索やプライバシー保護についての情報も発信しています。
</p>
</div>

<div class="section">
  <h2>おすすめ記事</h2>
  <ul>
    <li><a href="/articles/privacy.html">プライバシーの守り方</a></li>
    <li><a href="/articles/security.html">安全なネットの使い方</a></li>
    <li><a href="/articles/anonymous.html">匿名ブラウザとは</a></li>
    <li><a href="/articles/danger.html">危険サイトの見分け方</a></li>
    <li><a href="/articles/search-safe.html">安全な検索方法</a></li>
  </ul>
</div>

<div class="footer">
  <a href="/legal/about.html">運営者情報</a> |
  <a href="/legal/privacy-policy.html">プライバシーポリシー</a> |
  <a href="/legal/terms.html">利用規約</a> |
  <a href="/legal/contact.html">お問い合わせ</a>
</div>

    <script>
async function search() {
  const query = document.getElementById("searchInput").value;

  if (!query) return;

  try {
    const res = await fetch("/search?q=" + encodeURIComponent(query));
    const data = await res.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!data.results || data.results.length === 0) {
      resultsDiv.innerHTML = "<p>結果が見つかりませんでした</p>";
      return;
    }

    data.results.forEach(item => {
      const div = document.createElement("div");
      div.innerHTML = `
        <h3><a href="${item.url}" target="_blank">${item.title}</a></h3>
        <p>${item.content}</p>
        <hr>
      `;
      resultsDiv.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    alert("検索エラーが発生しました");
  }
}
</script>
    
</body>
</html>
