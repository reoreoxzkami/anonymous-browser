<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Anonymous Browser</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #0f172a;
    }

    input {
      padding: 10px;
      border-radius: 20px;
      border: none;
      width: 300px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 30px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<header>
  <div>🚀 Anonymous Browser</div>

  <div>
    <input id="email" placeholder="email">
    <input id="password" placeholder="password" type="password">
    <button onclick="login()">Login</button>
  </div>
</header>

<div class="container">

  <div>
    <input id="url" placeholder="https://example.com">
    <button onclick="go()">Go</button>
  </div>

  <br>

  <div>
    <input id="search" placeholder="Search">
    <button onclick="search()">Search</button>
  </div>

  <br>

  <iframe id="frame"></iframe>

</div>

<script src="script.js"></script>

</body>
</html>
