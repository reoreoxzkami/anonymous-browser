<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>匿名ブラウザ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    .box {
      margin: 20px;
    }

    input {
      width: 60%;
      padding: 10px;
    }

    button {
      padding: 10px 20px;
      margin-left: 5px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>匿名ブラウザ</h1>

  <!-- URLアクセス -->
  <div class="box">
    <input id="url" placeholder="https://example.com" />
    <button onclick="go()">アクセス</button>
  </div>

  <!-- 検索 -->
  <div class="box">
    <input id="search" placeholder="検索ワード" />
    <button onclick="search()">検索</button>
  </div>

  <iframe id="frame"></iframe>

  <script>
    function go() {
      const url = document.getElementById("url").value;
      document.getElementById("frame").src =
        "/proxy?url=" + encodeURIComponent(url);
    }

    function search() {
      const q = document.getElementById("search").value;
      document.getElementById("frame").src =
        "/search?q=" + encodeURIComponent(q);
    }
  </script>

</body>
</html>
